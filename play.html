<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play Holi! 🎨💦</title>
  <meta name="description" content="Play virtual Holi with colors and joy!">
  <meta name="theme-color" content="#FF1493">

  <!-- Open Graph / WhatsApp / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://holi.poloju.dev/">
  <meta property="og:title" content="Happy Holi! 🎨🌈✨">
  <meta property="og:description"
    content="Come play virtual Holi with me! Splash colors, have fun, and celebrate the festival of colors! 💦🎉">
  <meta property="og:image" content="https://holi.poloju.dev/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Happy Holi! 🎨🌈✨">
  <meta name="twitter:description"
    content="Come play virtual Holi with me! Splash colors, have fun, and celebrate! 💦🎉">
  <meta name="twitter:image" content="https://holi.poloju.dev/assets/og-image.png">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <link rel="apple-touch-icon" href="assets/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
    }

    .container {
      width: 100%;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
    }

    /* ===== ENTRANCE ANIMATION ===== */
    .container {
      animation: pageEnter 0.6s ease-out;
    }

    @keyframes pageEnter {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    /* ===== VIDEO AREA ===== */
    .video-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111;
    }

    .video-player {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }



    /* ===== HOLI COLORS OVERLAY ===== */
    .holi-colors-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }

    .holi-colors-overlay.active {
      display: block;
    }

    .color-splash-anim {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      filter: blur(2px);
      mix-blend-mode: screen;
    }

    /* Color powder burst */
    .powder-burst {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
    }

    /* ===== BOTTOM CONTROLS ===== */
    .bottom-controls {
      position: relative;
      z-index: 10;
      padding: 20px 24px 36px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.7), transparent);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .now-playing {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .now-playing.visible {
      opacity: 1;
    }

    .play-btn {
      width: 100%;
      max-width: 320px;
      padding: 18px 32px;
      border: none;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      background: linear-gradient(135deg, #FF1493, #FF6347, #FFD700, #00BFFF, #32CD32);
      background-size: 300% 300%;
      color: white;
      box-shadow:
        0 8px 32px rgba(255, 20, 147, 0.3),
        0 4px 16px rgba(255, 99, 71, 0.2);
      animation: btnGradient 4s ease infinite, btnFloat 3s ease-in-out infinite;
    }

    @keyframes btnGradient {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes btnFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-3px);
      }
    }

    .play-btn:active {
      transform: scale(0.96) !important;
      box-shadow:
        0 4px 16px rgba(255, 20, 147, 0.4),
        0 2px 8px rgba(255, 99, 71, 0.3);
    }

    .play-btn .btn-icon {
      margin-right: 8px;
      font-size: 20px;
    }

    .play-btn::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, #FF1493, #FFD700, #00BFFF, #32CD32, #FF6347);
      background-size: 300% 300%;
      border-radius: 52px;
      z-index: -1;
      animation: btnGradient 4s ease infinite;
      filter: blur(8px);
      opacity: 0.5;
    }

    /* ===== Confetti for color explosion ===== */
    .confetti-container {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }

    .confetti-container.active {
      display: block;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 431px) {
      .container {
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }
    }
  </style>
</head>

<body>
  <div class="container" id="mainContainer">
    <!-- Video Area -->
    <div class="video-area" id="videoArea">
      <video class="video-player" id="videoPlayer" src="assets/gemini_generated_video_4bb54706.mp4" playsinline
        webkit-playsinline preload="auto" muted></video>



      <!-- Holi colors overlay -->
      <div class="holi-colors-overlay" id="holiColors"></div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
      <div class="now-playing" id="nowPlaying">🎶 Now Playing</div>
      <button class="play-btn" id="playBtn" onclick="handlePlay()">
        <span class="btn-icon">▶</span> Play Holi
      </button>
    </div>
  </div>

  <!-- Confetti -->
  <div class="confetti-container" id="confettiContainer"></div>

  <!-- Background Music -->
  <audio id="bgMusic" loop preload="auto">
    <source src="assets/Janmashtami Special  Radha Kaise Na Jale  Bipra Bala  Flute Instrumental.mp3" type="audio/mpeg">
  </audio>

  <script>
    const video = document.getElementById('videoPlayer');
    const playBtn = document.getElementById('playBtn');
    const holiColors = document.getElementById('holiColors');
    const confettiContainer = document.getElementById('confettiContainer');
    const nowPlaying = document.getElementById('nowPlaying');
    const bgMusic = document.getElementById('bgMusic');

    let isPlaying = false;
    let colorInterval = null;
    let edgeInterval = null;
    let confettiInterval = null;
    let musicStarted = false;

    // ===== BACKGROUND MUSIC =====
    // Resume from saved position
    const savedTime = sessionStorage.getItem('bgMusicTime');
    if (savedTime) {
      bgMusic.currentTime = parseFloat(savedTime);
    }

    function startMusic() {
      if (!musicStarted) {
        bgMusic.play().then(() => {
          musicStarted = true;
        }).catch(() => { });
      }
    }

    // Start music on any user interaction
    document.addEventListener('click', startMusic, { once: false });
    document.addEventListener('touchstart', startMusic, { once: false });

    // Try autoplay immediately
    bgMusic.play().then(() => {
      musicStarted = true;
    }).catch(() => { });

    // Save position before leaving page
    window.addEventListener('beforeunload', () => {
      sessionStorage.setItem('bgMusicTime', bgMusic.currentTime);
    });

    const HOLI_COLORS = [
      '#FF1493', '#FF69B4', '#FF6347', '#FF4500',
      '#FFD700', '#FFA500', '#FFFF00',
      '#00BFFF', '#1E90FF', '#00CED1',
      '#32CD32', '#00FF7F', '#7CFC00',
      '#9B59B6', '#8A2BE2', '#DA70D6',
      '#FF1744', '#F50057', '#D500F9',
      '#00E5FF', '#76FF03', '#FFEA00'
    ];

    function handlePlay() {
      if (!isPlaying) {
        startHoli();
      } else {
        // Toggle pause/play
        if (video.paused) {
          video.play();
          playBtn.innerHTML = '<span class="btn-icon">⏸</span> Pause';
        } else {
          video.pause();
          playBtn.innerHTML = '<span class="btn-icon">▶</span> Play';
        }
      }
    }

    function startHoli() {
      isPlaying = true;

      // Play video
      video.play();

      // Update button
      playBtn.innerHTML = '<span class="btn-icon">⏸</span> Pause';
      nowPlaying.classList.add('visible');

      // Launch color explosion
      launchColorExplosion();

      // Start continuous color effects
      startContinuousColors();

      // Confetti burst
      launchConfetti();
    }

    // ===== VIDEO ENDED — RESET =====
    video.addEventListener('ended', function () {
      // Stop video and reset to beginning
      video.pause();
      video.currentTime = 0;

      // Reset state
      isPlaying = false;

      // Reset play button
      playBtn.innerHTML = '<span class="btn-icon">▶</span> Play Holi';
      nowPlaying.classList.remove('visible');

      // Clear all intervals
      if (colorInterval) clearInterval(colorInterval);
      if (edgeInterval) clearInterval(edgeInterval);
      if (confettiInterval) clearInterval(confettiInterval);
      colorInterval = null;
      edgeInterval = null;
      confettiInterval = null;

      // Clean up color overlays and confetti
      holiColors.innerHTML = '';
      holiColors.classList.remove('active');
      confettiContainer.innerHTML = '';
      confettiContainer.classList.remove('active');
    });

    // ===== COLOR EXPLOSION =====
    function launchColorExplosion() {
      holiColors.classList.add('active');

      const w = holiColors.offsetWidth;
      const h = holiColors.offsetHeight;

      // Create multiple splash waves
      for (let wave = 0; wave < 4; wave++) {
        setTimeout(() => {
          for (let i = 0; i < 8; i++) {
            createSplash(
              Math.random() * w,
              Math.random() * h,
              HOLI_COLORS[Math.floor(Math.random() * HOLI_COLORS.length)],
              wave * 200
            );
          }
        }, wave * 200);
      }

      // Powder bursts from center
      for (let i = 0; i < 60; i++) {
        setTimeout(() => {
          createPowderBurst(w / 2, h / 2);
        }, Math.random() * 1000);
      }

      // Side bursts
      setTimeout(() => {
        for (let i = 0; i < 30; i++) {
          createPowderBurst(0, Math.random() * h);
          createPowderBurst(w, Math.random() * h);
        }
      }, 500);
    }

    function createSplash(x, y, color, delay) {
      const splash = document.createElement('div');
      splash.classList.add('color-splash-anim');
      const size = Math.random() * 200 + 100;
      splash.style.width = size + 'px';
      splash.style.height = size + 'px';
      splash.style.backgroundColor = color;
      splash.style.left = (x - size / 2) + 'px';
      splash.style.top = (y - size / 2) + 'px';

      holiColors.appendChild(splash);

      setTimeout(() => {
        splash.style.transition = `all ${0.8 + Math.random() * 0.5}s cubic-bezier(0.16, 1, 0.3, 1)`;
        splash.style.opacity = '0.6';
        splash.style.transform = `scale(${2 + Math.random() * 2})`;
        splash.style.filter = `blur(${20 + Math.random() * 30}px)`;
      }, delay + 20);

      setTimeout(() => {
        splash.style.transition = 'opacity 1.5s ease';
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 1500);
      }, delay + 2000);
    }

    function createPowderBurst(originX, originY) {
      const color = HOLI_COLORS[Math.floor(Math.random() * HOLI_COLORS.length)];
      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 300 + 100;
      const dx = Math.cos(angle) * velocity;
      const dy = Math.sin(angle) * velocity;

      const particle = document.createElement('div');
      particle.classList.add('powder-burst');
      particle.style.backgroundColor = color;
      particle.style.left = originX + 'px';
      particle.style.top = originY + 'px';
      particle.style.boxShadow = `0 0 6px ${color}`;

      holiColors.appendChild(particle);

      const duration = 1 + Math.random() * 1.5;
      particle.style.transition = `all ${duration}s cubic-bezier(0.16, 1, 0.3, 1)`;

      requestAnimationFrame(() => {
        particle.style.transform = `translate(${dx}px, ${dy}px) scale(${Math.random() * 3 + 1})`;
        particle.style.opacity = '0.8';

        setTimeout(() => {
          particle.style.opacity = '0';
          setTimeout(() => particle.remove(), 500);
        }, duration * 600);
      });
    }

    // ===== CONTINUOUS COLORS =====
    function startContinuousColors() {
      colorInterval = setInterval(() => {
        if (!video.paused) {
          const w = holiColors.offsetWidth;
          const h = holiColors.offsetHeight;

          // Random splashes
          createSplash(
            Math.random() * w,
            Math.random() * h,
            HOLI_COLORS[Math.floor(Math.random() * HOLI_COLORS.length)],
            0
          );

          // Random powder
          for (let i = 0; i < 3; i++) {
            createPowderBurst(Math.random() * w, Math.random() * h);
          }
        }
      }, 800);

      // Screen edge color waves
      edgeInterval = setInterval(() => {
        if (!video.paused) {
          createEdgeWave();
        }
      }, 3000);
    }

    function createEdgeWave() {
      const w = holiColors.offsetWidth;
      const h = holiColors.offsetHeight;
      const color = HOLI_COLORS[Math.floor(Math.random() * HOLI_COLORS.length)];
      const side = Math.floor(Math.random() * 4);

      const wave = document.createElement('div');
      wave.style.position = 'absolute';
      wave.style.backgroundColor = color;
      wave.style.filter = 'blur(30px)';
      wave.style.opacity = '0';
      wave.style.mixBlendMode = 'screen';
      wave.style.borderRadius = '50%';

      switch (side) {
        case 0: // top
          wave.style.width = w + 'px';
          wave.style.height = '100px';
          wave.style.top = '-50px';
          wave.style.left = '0';
          break;
        case 1: // right
          wave.style.width = '100px';
          wave.style.height = h + 'px';
          wave.style.top = '0';
          wave.style.right = '-50px';
          break;
        case 2: // bottom
          wave.style.width = w + 'px';
          wave.style.height = '100px';
          wave.style.bottom = '-50px';
          wave.style.left = '0';
          break;
        case 3: // left
          wave.style.width = '100px';
          wave.style.height = h + 'px';
          wave.style.top = '0';
          wave.style.left = '-50px';
          break;
      }

      holiColors.appendChild(wave);

      requestAnimationFrame(() => {
        wave.style.transition = 'opacity 1s ease-in, transform 2s ease';
        wave.style.opacity = '0.4';
        wave.style.transform = side % 2 === 0 ? 'scaleY(3)' : 'scaleX(3)';

        setTimeout(() => {
          wave.style.opacity = '0';
          setTimeout(() => wave.remove(), 1000);
        }, 1500);
      });
    }

    // ===== CONFETTI =====
    function launchConfetti() {
      confettiContainer.classList.add('active');

      for (let i = 0; i < 100; i++) {
        setTimeout(() => {
          createConfettiPiece();
        }, Math.random() * 1500);
      }

      // Continue confetti
      confettiInterval = setInterval(() => {
        if (!video.paused) {
          for (let i = 0; i < 5; i++) {
            createConfettiPiece();
          }
        }
      }, 2000);
    }

    function createConfettiPiece() {
      const piece = document.createElement('div');
      piece.classList.add('confetti-piece');
      const color = HOLI_COLORS[Math.floor(Math.random() * HOLI_COLORS.length)];
      const size = Math.random() * 12 + 6;
      const startX = Math.random() * window.innerWidth;
      const isCircle = Math.random() > 0.5;

      piece.style.width = size + 'px';
      piece.style.height = isCircle ? size + 'px' : size * 0.4 + 'px';
      piece.style.backgroundColor = color;
      piece.style.borderRadius = isCircle ? '50%' : '2px';
      piece.style.left = startX + 'px';
      piece.style.top = '-20px';
      piece.style.boxShadow = `0 0 4px ${color}`;

      confettiContainer.appendChild(piece);

      const duration = 2 + Math.random() * 3;
      const drift = (Math.random() - 0.5) * 200;
      const rotations = Math.random() * 720;

      piece.style.transition = `all ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;

      requestAnimationFrame(() => {
        piece.style.opacity = '1';
        piece.style.transform = `translateY(${window.innerHeight + 50}px) translateX(${drift}px) rotate(${rotations}deg)`;

        setTimeout(() => {
          piece.remove();
        }, duration * 1000);
      });
    }
  </script>
</body>

</html>
