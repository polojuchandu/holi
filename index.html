<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Holi 🎨</title>
    <meta name="description" content="Celebrate Holi with colors, joy and fun! A virtual Holi experience.">
    <meta name="theme-color" content="#FF1493">

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://holi.poloju.dev/">
    <meta property="og:title" content="Happy Holi! 🎨🌈✨">
    <meta property="og:description"
        content="Come play virtual Holi with me! Splash colors, have fun, and celebrate the festival of colors! 💦🎉">
    <meta property="og:image" content="https://holi.poloju.dev/assets/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Happy Holi! 🎨🌈✨">
    <meta name="twitter:description"
        content="Come play virtual Holi with me! Splash colors, have fun, and celebrate! 💦🎉">
    <meta name="twitter:image" content="https://holi.poloju.dev/assets/og-image.png">

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link rel="apple-touch-icon" href="assets/og-image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
        }

        .container {
            width: 100%;
            height: 100dvh;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* ===== COLOR SPLASHES BACKGROUND ===== */
        .bg-splashes {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .splash {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0;
            animation: splashIn 1.5s ease-out forwards;
        }

        .splash-1 {
            width: 200px;
            height: 200px;
            background: #FF1493;
            top: -50px;
            left: -40px;
            animation-delay: 0.3s;
        }

        .splash-2 {
            width: 180px;
            height: 180px;
            background: #FFD700;
            top: 10%;
            right: -30px;
            animation-delay: 0.6s;
        }

        .splash-3 {
            width: 160px;
            height: 160px;
            background: #00BFFF;
            bottom: 30%;
            left: -20px;
            animation-delay: 0.9s;
        }

        .splash-4 {
            width: 220px;
            height: 220px;
            background: #32CD32;
            bottom: -40px;
            right: -50px;
            animation-delay: 1.2s;
        }

        .splash-5 {
            width: 140px;
            height: 140px;
            background: #FF6347;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 0.5s;
        }

        @keyframes splashIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }

            100% {
                opacity: 0.35;
                transform: scale(1);
            }
        }

        /* ===== HERO IMAGE ===== */
        .hero-image-wrapper {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInImage 1.2s ease-out 0.2s forwards;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    transparent 40%,
                    rgba(0, 0, 0, 0.3) 60%,
                    rgba(0, 0, 0, 0.85) 100%);
        }

        @keyframes fadeInImage {
            0% {
                opacity: 0;
                transform: scale(1.08);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== FLOATING COLOR PARTICLES ===== */
        .particles {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
                transform: translateY(90vh) rotate(36deg) scale(1);
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg) scale(0.3);
                opacity: 0;
            }
        }

        /* ===== DIALOG BOX ===== */
        .dialog-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 24px 20px 40px;
            opacity: 0;
            transform: translateY(100%);
            animation: slideUpDialog 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2s forwards;
        }

        @keyframes slideUpDialog {
            0% {
                opacity: 0;
                transform: translateY(100%);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dialog-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 32px 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            text-align: center;
        }

        .dialog-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #FF1493, #FFD700, #00BFFF, #32CD32, #FF6347);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: none;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .dialog-emoji {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .dialog-question {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .dialog-question span {
            color: #FFD700;
        }

        .buttons-row {
            display: flex;
            gap: 12px;
        }

        .btn-holi {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-yes-1 {
            background: linear-gradient(135deg, #FF1493, #FF6347);
            color: white;
            box-shadow: 0 8px 24px rgba(255, 20, 147, 0.4);
        }

        .btn-yes-2 {
            background: linear-gradient(135deg, #00BFFF, #32CD32);
            color: white;
            box-shadow: 0 8px 24px rgba(0, 191, 255, 0.4);
        }

        .btn-holi:active {
            transform: scale(0.95);
        }

        .btn-holi::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-holi:active::after {
            opacity: 1;
        }

        /* ===== TRANSITION OVERLAY ===== */
        .transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        .transition-overlay.active {
            display: block;
            pointer-events: all;
        }

        .color-burst {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 431px) {
            .container {
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>

<body>
    <div class="container" id="mainContainer">
        <!-- Background color splashes -->
        <div class="bg-splashes">
            <div class="splash splash-1"></div>
            <div class="splash splash-2"></div>
            <div class="splash splash-3"></div>
            <div class="splash splash-4"></div>
            <div class="splash splash-5"></div>
        </div>

        <!-- Hero Image -->
        <div class="hero-image-wrapper">
            <img src="assets/1772598871805.png" alt="Happy Holi Celebration" class="hero-image" id="heroImage">
            <div class="hero-overlay"></div>
        </div>

        <!-- Floating particles -->
        <div class="particles" id="particles"></div>

        <!-- Dialog -->
        <div class="dialog-wrapper" id="dialogWrapper">
            <div class="dialog-box">
                <span class="dialog-emoji">🎨🌈✨</span>
                <h1 class="dialog-title">Happy Holi!</h1>
                <p class="dialog-question">Do you wanna play <span>Holi</span>? 💦</p>
                <div class="buttons-row">
                    <button class="btn-holi btn-yes-1" id="btnYes1" onclick="goToPlay(this)">Yessss 🎉</button>
                    <button class="btn-holi btn-yes-2" id="btnYes2" onclick="goToPlay(this)">Yes 💃</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Transition overlay -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <!-- Background Music -->
    <audio id="bgMusic" loop preload="auto">
        <source src="assets/Janmashtami Special  Radha Kaise Na Jale  Bipra Bala  Flute Instrumental.mp3"
            type="audio/mpeg">
    </audio>

    <script>
        // ===== BACKGROUND MUSIC =====
        const bgMusic = document.getElementById('bgMusic');
        let musicStarted = false;

        // Try to resume from saved position
        const savedTime = sessionStorage.getItem('bgMusicTime');
        if (savedTime) {
            bgMusic.currentTime = parseFloat(savedTime);
        }

        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                }).catch(() => { });
            }
        }

        // Start music on any user interaction
        document.addEventListener('click', startMusic, { once: false });
        document.addEventListener('touchstart', startMusic, { once: false });

        // Try autoplay immediately
        bgMusic.play().then(() => {
            musicStarted = true;
        }).catch(() => { });

        // Save position before leaving page
        window.addEventListener('beforeunload', () => {
            sessionStorage.setItem('bgMusicTime', bgMusic.currentTime);
        });

        // ===== FLOATING PARTICLES =====
        const particlesContainer = document.getElementById('particles');
        const colors = ['#FF1493', '#FFD700', '#00BFFF', '#32CD32', '#FF6347', '#9B59B6', '#FF8C00', '#00CED1'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 10 + 4;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const left = Math.random() * 100;
            const duration = Math.random() * 6 + 5;
            const delay = Math.random() * 4;

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.backgroundColor = color;
            particle.style.left = left + '%';
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = delay + 's';

            particlesContainer.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, (duration + delay) * 1000);
        }

        // Create initial batch
        for (let i = 0; i < 20; i++) {
            createParticle();
        }

        // Continuously create particles
        setInterval(() => {
            createParticle();
        }, 400);

        // ===== TRANSITION TO PLAY PAGE =====
        function goToPlay(btn) {
            // Save music position before navigating
            sessionStorage.setItem('bgMusicTime', bgMusic.currentTime);

            const overlay = document.getElementById('transitionOverlay');
            overlay.classList.add('active');

            const burstColors = ['#FF1493', '#FFD700', '#00BFFF', '#32CD32', '#FF6347', '#9B59B6'];
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            burstColors.forEach((color, i) => {
                const burst = document.createElement('div');
                burst.classList.add('color-burst');
                burst.style.backgroundColor = color;
                burst.style.left = (cx - 25) + 'px';
                burst.style.top = (cy - 25) + 'px';
                burst.style.width = '50px';
                burst.style.height = '50px';

                overlay.appendChild(burst);

                setTimeout(() => {
                    burst.style.transition = `transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease`;
                    burst.style.transform = `scale(${60 + i * 5})`;
                    burst.style.opacity = '1';
                }, i * 80);
            });

            setTimeout(() => {
                window.location.href = 'play.html';
            }, 800);
        }
    </script>
</body>

</html>
