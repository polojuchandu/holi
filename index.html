<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holi - For Her</title>
    <meta name="description" content="The colors, the music, the splashes - all for her. She never saw it.">
    <meta name="theme-color" content="#FF1493">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #100d12; font-family: 'Poppins', sans-serif; }
        .shutdown { display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; text-align: center; padding: 24px; background: #100d12; }
        .shutdown-icon { font-size: 48px; margin-bottom: 16px; }
        .shutdown-title { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        .shutdown-msg { font-size: 18px; color: rgba(255,255,255,0.67); margin-bottom: 24px; }
        .shutdown-footer { font-size: 15px; color: #e57492; font-style: italic; margin-top: 34px; }
    </style>
</head>
<body>
    <main class="shutdown" aria-label="Site shutdown notice">
        <div>
            <p class="shutdown-icon" aria-hidden="true">🌸</p>
            <h1 class="shutdown-title">This Holi Was For Her</h1>
            <p class="shutdown-msg">The colors, the music, the splashes - all for her. She never saw it.</p>
            <div class="shutdown-footer">- Made with love. Taken offline quietly💔</div>
        </div>
    </main>
</body>
</html>
